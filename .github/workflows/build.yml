name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: list before
      run: ls

    - name: Build with Gradle
      run: ./gradlew build

    - name: list after
      run: ls build/libs

    - name: Upload a Build Artifact
      uses: actions/upload-artifact@v7
      with:
        name: bff
        path: build/libs

